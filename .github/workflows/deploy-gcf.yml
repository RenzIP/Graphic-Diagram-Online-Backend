# Deploy GraDiOl Backend to Google Cloud Functions (Gen 2)
#
# Semua config disimpan di GitHub Secrets (Settings → Secrets and variables → Secrets):
#
#   GCP_SA_KEY                      – Service Account JSON key (copy-paste isi file)
#   GCP_PROJECT_ID                  – GCP project ID
#
#   JWT_SECRET                      – JWT signing key (wajib di production)
#   SUPABASE_DATABASE_URL           – PostgreSQL connection string
#   FRONTEND_URL                    – URL frontend, misal https://gradiol.vercel.app
#   BACKEND_URL                     – URL backend setelah deploy
#   REDIS_URL                       – Redis connection string (opsional)
#   GOOGLE_CLIENT_ID                – Google OAuth Client ID
#   GOOGLE_CLIENT_SECRET            – Google OAuth Client Secret
#   GITHUB_CLIENT_ID                – GitHub OAuth Client ID
#   GITHUB_CLIENT_SECRET            – GitHub OAuth Client Secret
#
# Variables (Settings → Secrets and variables → Variables):
#   GCF_FUNCTION_NAME               – Cloud Function name (default: gradiol-api)
#   GCF_REGION                      – Deployment region (default: asia-southeast2)

name: Deploy to GCP Cloud Functions

on:
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/deploy-gcf.yml"
  workflow_dispatch: # allow manual trigger

env:
  GO_VERSION: "1.25"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FUNCTION_NAME: ${{ vars.GCF_FUNCTION_NAME || 'gradiol-api' }}
      REGION: ${{ vars.GCF_REGION || 'asia-southeast1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify build
        run: go build ./...

      - name: Run tests (if any)
        run: go test ./... -count=1 -timeout=60s || echo "No tests found — skipping"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Functions
        run: |
          gcloud functions deploy "${{ env.FUNCTION_NAME }}" \
            --entry-point=Handle \
            --trigger-http \
            --gen2 \
            --runtime=go125 \
            --region="${{ env.REGION }}" \
            --allow-unauthenticated \
            --timeout=300s \
            --memory=512MiB \
            --min-instances=0 \
            --max-instances=10 \
            --cpu=1 \
            --concurrency=80 \
            --set-build-env-vars=GOFLAGS=-buildvcs=false \
            --set-env-vars="\
          ENV=production,\
          LOG_LEVEL=info,\
          LOG_FORMAT=text,\
          JWT_SECRET='${{ secrets.JWT_SECRET }}',\
          SUPABASE_DATABASE_URL='${{ secrets.SUPABASE_DATABASE_URL }}',\
          FRONTEND_URL='${{ secrets.FRONTEND_URL }}',\
          BACKEND_URL='${{ secrets.BACKEND_URL }}',\
          REDIS_URL='${{ secrets.REDIS_URL }}',\
          GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}',\
          GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}',\
          GITHUB_CLIENT_ID='${{ secrets.G_CLIENT_ID }}',\
          GITHUB_CLIENT_SECRET='${{ secrets.G_CLIENT_SECRET }}'"

      - name: Show deployed URL
        run: |
          URL=$(gcloud functions describe "${{ env.FUNCTION_NAME }}" \
            --gen2 \
            --region="${{ env.REGION }}" \
            --format="value(serviceConfig.uri)")
          echo "🚀 Deployed to: $URL"
