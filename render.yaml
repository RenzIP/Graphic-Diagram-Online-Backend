# Render Blueprint — GraDiOl Backend (standalone repo)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gradiol-backend
    runtime: go
    plan: free
    # Render builds at the repo root (this directory), so paths are relative to backend/.
    buildCommand: go mod download && go build -tags netgo -ldflags "-s -w" -o bin/gradiol-api ./cmd/api && go build -tags netgo -ldflags "-s -w" -o bin/gradiol-migrate ./cmd/migrate
    startCommand: ./bin/gradiol-api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GO_VERSION
        value: "1.25.0"
      - key: ENV
        value: production
      # Secrets — set these in the Render dashboard (sync: false keeps them out of the repo).
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: text
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
