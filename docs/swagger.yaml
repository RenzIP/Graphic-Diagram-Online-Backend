basePath: /gradiol-api/api
securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: JWT Bearer token. Cukup tempel token mentah (tanpa prefix 'Bearer '). Token didapat dari /login atau /register.
definitions:
  dto.AddMemberReq:
    properties:
      identifier:
        maxLength: 255
        minLength: 1
        type: string
      role:
        enum:
        - editor
        - viewer
        type: string
    required:
    - identifier
    - role
    type: object
  dto.AuthCallbackResp:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.AuthUserResp'
    type: object
  dto.AuthUserResp:
    properties:
      avatar:
        type: string
      avatar_url:
        type: string
      email:
        type: string
      full_name:
        description: Keep existing ones for backward compatibility
        type: string
      id:
        type: string
      name:
        type: string
      provider:
        type: string
      role:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
  dto.ChangePasswordReq:
    properties:
      current_password:
        type: string
      new_password:
        maxLength: 72
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  dto.CreateDocumentReq:
    properties:
      content:
        type: object
      diagram_type:
        enum:
        - flowchart
        - erd
        - usecase
        - sequence
        - mindmap
        - blank
        type: string
      project_id:
        type: string
      title:
        maxLength: 200
        type: string
      view:
        type: object
      workspace_id:
        type: string
    required:
    - diagram_type
    - workspace_id
    type: object
  dto.CreateProjectReq:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      workspace_id:
        type: string
    required:
    - name
    - workspace_id
    type: object
  dto.CreateWorkspaceReq:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.DocumentListItem:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      diagram_type:
        type: string
      id:
        type: string
      project_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      version:
        type: integer
      workspace_id:
        type: string
    type: object
  dto.DocumentListResp:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.DocumentListItem'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.DocumentResp:
    properties:
      content:
        type: object
      created_at:
        type: string
      created_by:
        type: string
      diagram_type:
        type: string
      id:
        type: string
      project_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      version:
        type: integer
      view:
        type: object
      workspace_id:
        type: string
    type: object
  dto.LoginReq:
    properties:
      identifier:
        description: email or username
        type: string
      password:
        type: string
    required:
    - identifier
    - password
    type: object
  dto.MemberListResp:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MemberResp'
        type: array
    type: object
  dto.MemberResp:
    properties:
      avatar:
        type: string
      email:
        type: string
      is_owner:
        type: boolean
      joined_at:
        type: string
      name:
        type: string
      role:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  dto.PaginationMeta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.RegisterReq:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - name
    - password
    - username
    type: object
  dto.UpdateDocumentReq:
    properties:
      content:
        type: object
      project_id:
        description: nullable — can move or set to null
        type: string
      title:
        maxLength: 200
        type: string
      view:
        type: object
    type: object
  dto.UpdateMemberRoleReq:
    properties:
      role:
        enum:
        - owner
        - editor
        - viewer
        type: string
    required:
    - role
    type: object
  dto.UpdateProjectReq:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  dto.UpdateWorkspaceReq:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  model.Document:
    properties:
      content:
        items:
          type: integer
        type: array
      created_at:
        type: string
      created_by:
        type: string
      diagram_type:
        type: string
      id:
        type: string
      project_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
      version:
        type: integer
      view:
        items:
          type: integer
        type: array
      workspace_id:
        type: string
    type: object
  model.DocumentVersion:
    properties:
      content:
        items:
          type: integer
        type: array
      created_at:
        type: string
      created_by:
        type: string
      document_id:
        type: string
      id:
        type: string
      version:
        type: integer
      view:
        items:
          type: integer
        type: array
    type: object
  model.Project:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      workspace_id:
        type: string
    type: object
  model.UserProfile:
    properties:
      avatar:
        type: string
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified_at:
        type: string
      full_name:
        description: Keep existing fields for backward compatibility if needed in
          some parts
        type: string
      id:
        type: string
      last_login:
        type: string
      name:
        type: string
      provider:
        type: string
      provider_id:
        type: string
      role:
        type: string
      status:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  model.Workspace:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  pkg.AppError:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
host: asia-southeast1-renzip-478811.cloudfunctions.net
info:
  contact: {}
  description: Backend API for Graphic Diagram Online (GraDiOl)
  title: GraDiOl API
  version: "1.0"
paths:
  /admin/documents:
    get:
      consumes:
      - application/json
      description: Lists all diagrams in the system along with workspace and project
        names
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: List all diagrams
      tags:
      - admin
  /admin/documents/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a diagram and all its historical versions
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Delete diagram
      tags:
      - admin
  /admin/overview:
    get:
      consumes:
      - application/json
      description: Returns system-wide counts of users, workspaces, projects, and
        documents
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Get system overview metrics
      tags:
      - admin
  /admin/users:
    get:
      consumes:
      - application/json
      description: Lists all user profiles registered in the system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.UserProfile'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - admin
  /admin/users/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a user and cleans up their workspace memberships from the
        platform
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - admin
  /admin/users/{id}/role:
    put:
      consumes:
      - application/json
      description: Updates a specific user's role to 'admin' or 'user'
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Target Role (e.g. {
        in: body
        name: role
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Update user role
      tags:
      - admin
  /admin/workspaces:
    get:
      consumes:
      - application/json
      description: Lists all workspaces in the system along with their owner details
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: List all workspaces
      tags:
      - admin
  /admin/workspaces/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a workspace along with all its child projects and documents
      parameters:
      - description: Workspace ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Delete workspace
      tags:
      - admin
  /change-password:
    post:
      consumes:
      - application/json
      description: Allows an authenticated user to change their password
      parameters:
      - description: Password Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Change Password
      tags:
      - auth
  /documents:
    post:
      consumes:
      - application/json
      description: Creates a new document in a workspace/project
      parameters:
      - description: Document Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateDocumentReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DocumentResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Create a new document
      tags:
      - documents
  /documents/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a document by ID
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Delete a document
      tags:
      - documents
    get:
      consumes:
      - application/json
      description: Retrieves the full content and metadata of a specific document
        by its ID
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DocumentResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Get document detail
      tags:
      - documents
    put:
      consumes:
      - application/json
      description: Updates a document's content and metadata
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Document Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateDocumentReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DocumentResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Update a document
      tags:
      - documents
  /documents/{id}/versions:
    get:
      consumes:
      - application/json
      description: Retrieves the history of saved versions for a document
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.DocumentVersion'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Get document versions
      tags:
      - documents
  /documents/{id}/versions/{version}/restore:
    post:
      consumes:
      - application/json
      description: Restores a document to a specific previous version
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Version number
        in: path
        name: version
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DocumentResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Restore document version
      tags:
      - documents
  /documents/recent:
    get:
      consumes:
      - application/json
      description: Retrieves the user's recently accessed/updated documents
      parameters:
      - description: Number of documents to retrieve
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Document'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Get recent documents
      tags:
      - documents
  /login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns an auth token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthCallbackResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      summary: Login user
      tags:
      - auth
  /projects:
    post:
      consumes:
      - application/json
      description: Creates a new project in a workspace
      parameters:
      - description: Project Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateProjectReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/pkg.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg.AppError'
      security:
      - BearerAuth: []
      summary: Create a new project
      tags:
      - projects
  /projects/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a project and its documents
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
